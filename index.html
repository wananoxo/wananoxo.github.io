<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=EB+Garamond:wght@400;500&display=swap');

  :root{
    --bg: #F7F2E9;
    --bg-soft: #EFE7D8;
    --ink: #3B352C;
    --ink-soft: #8C8172;
    --line: #DCD0BB;
    --accent: #AEB69B; /* 柔和鼠尾草綠，作為微量點綴 */
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    height: 100%;
  }

  body{
    background: radial-gradient(120% 140% at 50% 20%, var(--bg) 0%, var(--bg-soft) 100%);
    color: var(--ink);
    font-family: 'EB Garamond', 'Noto Serif TC', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .stage{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 44px;
    padding: 24px;
  }

  /* ---- 日晷式指針，取代一般 spinner，呼應「等待時間流逝」 ---- */
  .dial{
    position: relative;
    width: 148px;
    height: 148px;
  }

  .dial svg{
    width: 100%;
    height: 100%;
  }

  .dial-ring{
    fill: none;
    stroke: var(--line);
    stroke-width: 1;
  }

  .dial-tick{
    stroke: var(--ink-soft);
    stroke-width: 1;
  }

  .dial-tick.major{
    stroke: var(--ink);
    stroke-width: 1.3;
  }

  .dial-needle{
    transform-origin: 74px 74px;
    animation: sweep 6s linear infinite;
  }

  @keyframes sweep{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
  }

  .dial-needle line{
    stroke: var(--accent);
    stroke-width: 1.6;
    stroke-linecap: round;
  }

  .dial-core{
    fill: var(--ink);
  }

  /* ---- 文字區 ---- */
  .label{
    display: flex;
    align-items: baseline;
    gap: 2px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 40px;
    letter-spacing: 0.02em;
    color: var(--ink);
  }

  .dots span{
    display: inline-block;
    opacity: 0.25;
    animation: breathe 1.6s ease-in-out infinite;
  }
  .dots span:nth-child(1){ animation-delay: 0s; }
  .dots span:nth-child(2){ animation-delay: 0.2s; }
  .dots span:nth-child(3){ animation-delay: 0.4s; }

  @keyframes breathe{
    0%, 80%, 100%{ opacity: 0.2; }
    40%{ opacity: 1; }
  }

  .eyebrow{
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* ---- 進度線：緩緩填滿再重置，取代制式進度條 ---- */
  .progress-rule{
    position: relative;
    width: 220px;
    height: 1px;
    background: var(--line);
    overflow: hidden;
  }

  .progress-rule::after{
    content: "";
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: translateX(-100%);
    animation: fill 3.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
  }

  @keyframes fill{
    0%{ transform: translateX(-100%); }
    55%{ transform: translateX(0%); }
    100%{ transform: translateX(0%); opacity: 0; }
  }

  .footnote{
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
  }

  @media (prefers-reduced-motion: reduce){
    .dial-needle, .dots span, .progress-rule::after{
      animation: none !important;
    }
  }

  @media (max-width: 420px){
    .label{ font-size: 32px; }
    .progress-rule{ width: 180px; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="eyebrow">請稍候</div>

    <div class="dial">
      <svg viewBox="0 0 148 148">
        <circle class="dial-ring" cx="74" cy="74" r="70"></circle>
        <!-- 12 個刻度，仿日晷 -->
        <g id="ticks"></g>
        <g class="dial-needle">
          <line x1="74" y1="74" x2="74" y2="18"></line>
        </g>
        <circle class="dial-core" cx="74" cy="74" r="2.4"></circle>
      </svg>
    </div>

    <div class="label">
      Loading<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div class="progress-rule"></div>

    <div class="footnote">時間會帶來答案</div>
  </div>

<script>
  // 生成日晷刻度
  const ticksGroup = document.getElementById('ticks');
  const cx = 74, cy = 74, rOuter = 70, rInnerMinor = 62, rInnerMajor = 58;
  for (let i = 0; i < 12; i++) {
    const angle = (i * 30) * Math.PI / 180;
    const isMajor = i % 3 === 0;
    const rInner = isMajor ? rInnerMajor : rInnerMinor;
    const x1 = cx + rOuter * Math.sin(angle);
    const y1 = cy - rOuter * Math.cos(angle);
    const x2 = cx + rInner * Math.sin(angle);
    const y2 = cy - rInner * Math.cos(angle);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1.toFixed(2));
    line.setAttribute("y1", y1.toFixed(2));
    line.setAttribute("x2", x2.toFixed(2));
    line.setAttribute("y2", y2.toFixed(2));
    line.setAttribute("class", "dial-tick" + (isMajor ? " major" : ""));
    ticksGroup.appendChild(line);
  }
</script>

</body>
</html>
